<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>Página no encontrada — SOMNI</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0D1B2E;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;-webkit-font-smoothing:antialiased}
.code{font-family:'Montserrat',sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:900;line-height:1;letter-spacing:-.08em;background:linear-gradient(135deg,#fff 20%,#60a5fa 55%,#2581FC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px}
h1{font-family:'Montserrat',sans-serif;font-size:clamp(1.2rem,3vw,2rem);font-weight:800;margin-bottom:16px;letter-spacing:-.02em}
p{font-size:.95rem;color:rgba(255,255,255,.6);max-width:440px;line-height:1.75;margin-bottom:40px}
.btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn-p{background:#2581FC;color:#fff;padding:13px 28px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:.88rem;text-decoration:none;transition:.2s}
.btn-p:hover{background:#1a6fe0}
.btn-g{border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);padding:12px 26px;border-radius:10px;font-family:'Montserrat',sans-serif;font-weight:600;font-size:.88rem;text-decoration:none;transition:.2s}
.btn-g:hover{border-color:rgba(255,255,255,.4);color:#fff}
.logo{font-family:'Montserrat',sans-serif;font-size:1.2rem;font-weight:900;letter-spacing:-.04em;color:#fff;margin-bottom:60px;opacity:.6}
</style>
</head>
<body>
<div class="logo">SoMNi</div>
<div class="code">404</div>
<h1>Página no encontrada</h1>
<p>La página que busca no existe o fue movida. Puede volver al inicio o contactar a nuestro equipo.</p>
<div class="btns">
  <a href="/" class="btn-p">Volver al inicio</a>
  <a href="/#contacto" class="btn-g">Contactar a SOMNI</a>
</div>
</body>
</html>
